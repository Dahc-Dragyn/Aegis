# Sentinel Monitoring Rules

[[rules]]
name = "Standard Error"
pattern = r"ERRO[R]" # Simple regex
action = "notify"
cooldown = "30s"

[[rules]]
name = "Critical System Failure"
pattern = r"CRITICAL|FATAL|PANIC"
action = "notify"
script = "scripts/emergency_reboot.bat" # Optional self-healing
cooldown = "10s"
destructive = true

[[rules]]
name = "Database Connection"
pattern = r"DB_CONN_LOST"
action = "notify"
cooldown = "1m"

[[watches]]
path = "logs/app.log"
json = false

[[watches]]
path = "logs/server.json"
json = true
